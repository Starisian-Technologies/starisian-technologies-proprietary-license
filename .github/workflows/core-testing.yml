name: Starisian Core Testing
on: [push, pull_request]

permissions:
  contents: read

jobs:
  # Job 1: Debug and Test Python (Linguistics/AI)
  python-logic:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run Python Linter (Debug)
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  # Job 2: Test Node.js (SaaS/Marketing)
  node-services:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Skip duplicate Node audit
        run: |
          if [ -f package.json ]; then
            echo "Node dependency installation and auditing are handled in lint-and-syntax.yml; skipping duplicate npm install/npm audit in core-testing.yml."
          else
            echo "No package.json found — skipping Node workflow tasks."
          fi
