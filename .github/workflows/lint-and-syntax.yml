name: Starisian PHP & JS Logic
on: [push, pull_request]

permissions:
  contents: read

jobs:
  # Job 1: PHP Syntax & Security (Linguistics/Backend)
  php-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, mysql
      - name: Check PHP Syntax (Lint)
        run: |
          find . -name "*.php" -exec php -l {} \; | grep -v "No syntax errors detected" || true

  # Job 2: JavaScript & Node (SaaS/Frontend)
  js-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install & Audit
        run: |
          if [ -f package.json ]; then
            npm install
            npm audit
          else
            echo "No package.json found — skipping npm install and audit."
          fi
